# Validate the RIDE static site build.
#
# Triggers:
#   - Push to master
#   - Pull request to master
#   - Manual workflow_dispatch
#
# Deployment: GitHub Pages serves directly from the docs/ folder on master.
# This workflow validates the build but does not deploy (docs/ is committed).

name: Validate Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: python site/build.py --output _validate --site-url "https://ride.i-d-e.de"

      - name: Validate build output
        run: test -f _validate/index.html && test -f _validate/sitemap.xml
