<div id="citation-box" class="citation-box" hidden>
  <div class="citation-tabs" role="tablist" aria-label="Citation format">
    {% for fmt in ["BibTeX", "RIS", "APA", "MLA", "Chicago"] %}
    <button role="tab"
            id="tab-{{ fmt | lower }}"
            aria-controls="panel-{{ fmt | lower }}"
            aria-selected="{{ 'true' if loop.first else 'false' }}"
            {% if not loop.first %}tabindex="-1"{% endif %}
            class="citation-tab{% if loop.first %} is-active{% endif %}">
      {{ fmt }}
    </button>
    {% endfor %}
  </div>

  {% for fmt, key in [("BibTeX", "bibtex"), ("RIS", "ris"), ("APA", "apa"), ("MLA", "mla"), ("Chicago", "chicago")] %}
  <div role="tabpanel"
       id="panel-{{ key }}"
       aria-labelledby="tab-{{ key }}"
       class="citation-panel{% if not loop.first %} is-hidden{% endif %}"
       tabindex="0">
    <pre class="citation-content"><code>{{ citations[key] }}</code></pre>
    <button class="btn btn-copy" data-copy-target="panel-{{ key }}">Copy</button>
  </div>
  {% endfor %}
</div>
